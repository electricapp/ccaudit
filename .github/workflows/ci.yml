name: CI
on:
  push:
    branches: [master, main]
  pull_request:
# No `paths-ignore`: `rust`/`web` are *required* status checks, and a
# workflow skipped by a path filter never reports them — which leaves a
# docs-only PR stuck on "Expected — waiting for status". CI is ~2 min, so
# running it on every change is cheaper than the sentinel-job workaround.

# Cancel in-progress runs on the same ref when a new push/PR update lands.
# Branch protection only blocks merge on the *latest* required-check result,
# so older runs racing to completion just burn minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Lock down default perms; each job adds only what it needs.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  # ── Rust: build + test + clippy + rustfmt ──
  rust:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component clippy,rustfmt
          rustup default "${RUST_TOOLCHAIN}"
          rustc --version

      - name: Cache cargo registry + target
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (all features, deny warnings)
        run: cargo clippy --all-features --all-targets -- -D warnings

      # Lint every feature combination across ALL targets (lib + tests +
      # benches), not just `cargo check` on the lib — so a feature-gating
      # mistake in a bench or test is caught here instead of only under
      # --all-features above.
      - name: feature matrix (clippy, all targets, deny warnings)
        run: |
          set -eux
          cargo clippy --all-targets --no-default-features -- -D warnings
          cargo clippy --all-targets --no-default-features --features tui -- -D warnings
          cargo clippy --all-targets --no-default-features --features web -- -D warnings
          cargo clippy --all-targets --no-default-features --features locale -- -D warnings

      - name: build (release, all features, all targets)
        run: cargo build --release --all-features --all-targets

      - name: test
        run: cargo test --release --all-features

  # ── Web assets: prettier + eslint + stylelint + JS unit tests ──
  web:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install pinned dev tooling
        run: npm ci

      - name: prettier
        run: ./node_modules/.bin/prettier --check src/web/app.js src/web/style.css src/web/util.js src/web/test.js

      - name: eslint
        run: ./node_modules/.bin/eslint src/web/app.js src/web/util.js

      - name: stylelint
        run: ./node_modules/.bin/stylelint src/web/style.css

      - name: JS unit tests (headless)
        run: node src/web/run-tests.js

  # ── macOS: compile + clippy + test the macOS-only unsafe FFI ──
  # The ubuntu jobs above never see `src/source/bulk_scan_darwin.rs`
  # (getattrlistbulk) or the other `cfg(target_os = "macos")` code, so a
  # compile/clippy regression there would otherwise surface only at
  # release time on the mac runners. This lane lints it and runs the
  # scan() smoke test on every change.
  macos:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust ${{ env.RUST_TOOLCHAIN }}
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component clippy
          rustup default "${RUST_TOOLCHAIN}"
          rustc --version

      - name: Cache cargo registry + target
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-macos-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-macos-

      - name: clippy (all features — includes the macOS-gated FFI)
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: test
        run: cargo test --all-features

  # ── Lint the workflow files themselves (YAML + embedded shell) ──
  # shellcheck ships on the runner, so actionlint also checks the inline
  # bash. Catches dead runner labels, quoting bugs, and bad expressions
  # before they break a tag release (where failures are most expensive).
  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint (SHA-pinned download + checksum)
        run: |
          VER="1.7.12"
          SHA="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz" -o actionlint.tgz
          echo "${SHA}  actionlint.tgz" | sha256sum -c -
          tar -xzf actionlint.tgz actionlint
          ./actionlint

  # ── Unused dependencies: flag dead deps with cargo-machete ──
  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install cargo-machete
        uses: taiki-e/install-action@682e7d9e49c5e653d371fc6adbda67653461378a # v2.82.4
        with:
          tool: cargo-machete
      - name: Check for unused dependencies
        run: cargo machete
